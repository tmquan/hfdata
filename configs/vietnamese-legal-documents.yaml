_base: default.yaml

datasets:
  - th1nhng0/vietnamese-legal-documents

# Per-config overrides (key = HuggingFace config name)
config_overrides:
  metadata:
    skip_embedding: true
    chunk_size: 50000    # keep as single file (518K rows)
  content:
    max_seq_length: 8192 # 32768
    batch_size: 10
    chunk_size: 50000
