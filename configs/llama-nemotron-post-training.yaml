_base: default.yaml

# nvidia/Llama-Nemotron-Post-Training-Dataset
# Schema: input (list of messages) + output (string), or messages (list)
# Strategy: messages_concat flattens input messages and appends output

model_id:      microsoft/harrier-oss-v1-27b
embedding_dim: 5376
max_seq_length: 32768
text_strategy: messages_concat
batch_size: 1

datasets:
  - nvidia/Llama-Nemotron-Post-Training-Dataset

config_overrides:
  train:
    text_strategy: messages_list
